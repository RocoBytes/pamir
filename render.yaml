# Render.com Infrastructure-as-Code
# Referencia: https://render.com/docs/blueprint-spec
#
# Uso: conecta tu repositorio en Render.com y este archivo se detecta automáticamente.
# Las variables marcadas con `sync: false` debes añadirlas manualmente en el dashboard.

services:
  - type: web
    name: pamir-api
    runtime: node
    rootDir: backend
    # Render.com Free Tier duerme tras 15 min de inactividad.
    # El endpoint /api/health recibe pings cada 14 min desde un cronjob externo
    # (p. ej. cron-job.org) para evitar el cold start.
    #
    # Orden crítico del build:
    #   1. prisma generate  → genera src/generated/ (tipos TypeScript)
    #   2. tsc (build)      → compila TypeScript (requiere los tipos del paso 1)
    #   3. prisma migrate deploy → aplica migraciones pendientes a Neon.tech
    buildCommand: npm install && npm run db:generate && npm run build && npm run db:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT es inyectado automáticamente por Render en runtime (~10000).
      # No se declara aquí para evitar conflictos con el puerto asignado por la plataforma.
      # ── Añadir manualmente en el dashboard de Render ──────────────────────────
      - key: DATABASE_URL
        sync: false   # Neon.tech pooled endpoint (con -pooler. en el hostname)
      - key: JWT_SECRET
        sync: false   # node -e "require('crypto').randomBytes(64).toString('hex')"
      - key: BACKEND_URL
        sync: false   # https://pamir-api.onrender.com (sin slash final)
      - key: GOOGLE_CLIENT_ID
        sync: false   # Google Cloud Console → Credenciales → OAuth 2.0
      - key: GOOGLE_CLIENT_SECRET
        sync: false   # Google Cloud Console → Credenciales → OAuth 2.0
      - key: GOOGLE_REFRESH_TOKEN
        sync: false   # Generado con scripts/get-refresh-token.mjs
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false   # ID de la carpeta en Drive
      - key: FRONTEND_URL
        sync: false   # URL de tu app en Vercel, ej: https://pamir.vercel.app
